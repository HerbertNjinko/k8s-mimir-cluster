---
- name: Read join command from control-plane hostvars
  ansible.builtin.set_fact:
    join_command: "{{ hostvars[groups['controlplane'][0]].kubeadm_join_command }}"

- name: Check if worker already joined
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Join cluster
  ansible.builtin.command: "{{ join_command }}"
  when: not kubelet_conf.stat.exists
  register: join_out
  changed_when: true
