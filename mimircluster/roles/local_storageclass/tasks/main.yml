---
- name: Ensure local-path base directory exists on all nodes
  ansible.builtin.file:
    path: /opt/local-path-provisioner
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download local-path provisioner manifest
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml
    dest: /tmp/local-path-storage.yaml
    mode: "0644"
    validate_certs: false

- name: Apply local-path provisioner manifest
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f /tmp/local-path-storage.yaml
  register: local_path_apply
  changed_when: "'created' in local_path_apply.stdout or 'configured' in local_path_apply.stdout"

- name: Mark local-path as default StorageClass
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf patch storageclass local-path
    -p '{"metadata":{"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}'
  register: local_path_patch
  changed_when: "'patched' in local_path_patch.stdout"
  failed_when: false

- name: Wait for local-path provisioner rollout
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n local-path-storage
    rollout status deployment/local-path-provisioner --timeout=5m
  register: local_path_rollout
  changed_when: false
  failed_when: local_path_rollout.rc != 0

- name: Show storage classes
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf get storageclass
  register: sc_out
  changed_when: false

- name: Print storage classes
  ansible.builtin.debug:
    msg: "{{ sc_out.stdout_lines }}"
