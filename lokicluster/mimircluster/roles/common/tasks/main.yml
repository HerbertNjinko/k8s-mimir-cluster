---
- name: Install base packages
  ansible.builtin.dnf:
    name:
      - chrony
      - curl
      - iproute
      - iptables
      - socat
      - conntrack-tools
      - bash-completion
    state: present

- name: Enable chronyd
  ansible.builtin.service:
    name: chronyd
    state: started
    enabled: true

- name: Ensure /etc/hosts contains cluster entries
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ item.ip }} {{ item.names | join(' ') }}"
    state: present
    create: true
  loop: "{{ hosts_entries }}"

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false
  failed_when: false

- name: Comment out swap in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '(^.*\s+swap\s+.*$)'
    replace: '# \1'

- name: Load kernel modules config
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root
    group: root
    mode: "0644"

- name: Load kernel modules now
  ansible.builtin.command: "modprobe {{ item }}"
  loop:
    - overlay
    - br_netfilter
  changed_when: false
  failed_when: false

- name: Set sysctl params for Kubernetes networking
  ansible.builtin.copy:
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
    owner: root
    group: root
    mode: "0644"

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: false
