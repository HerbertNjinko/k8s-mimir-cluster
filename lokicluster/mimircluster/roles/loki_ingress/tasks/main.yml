---
- name: Render Loki ingress manifest
  ansible.builtin.template:
    src: loki-ingress.yaml.j2
    dest: /tmp/loki-ingress.yaml
    mode: "0644"

- name: Apply Loki ingress
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf apply -f /tmp/loki-ingress.yaml
  register: loki_ingress_apply
  changed_when: "'created' in loki_ingress_apply.stdout or 'configured' in loki_ingress_apply.stdout"

- name: Show Loki ingress
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ loki_namespace }} get ingress
  register: loki_ingress_out
  changed_when: false

- name: Print Loki ingress
  ansible.builtin.debug:
    msg: "{{ loki_ingress_out.stdout_lines }}"