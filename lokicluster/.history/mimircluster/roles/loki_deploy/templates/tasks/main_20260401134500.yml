---
- name: Ensure Loki namespace exists
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf create namespace {{ loki_namespace }}
  register: loki_ns_create
  failed_when: false
  changed_when: "'created' in loki_ns_create.stdout"

- name: Create or update Loki object storage credentials secret
  ansible.builtin.shell: |
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ loki_namespace }} \
      create secret generic {{ loki_s3_secret_name }} \
      --from-literal=AWS_ACCESS_KEY_ID='{{ loki_s3_access_key_id }}' \
      --from-literal=AWS_SECRET_ACCESS_KEY='{{ loki_s3_secret_access_key }}' \
      --dry-run=client -o yaml | \
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ loki_namespace }} apply -f -
  args:
    executable: /bin/bash
  register: loki_secret
  changed_when: "'created' in loki_secret.stdout or 'configured' in loki_secret.stdout"
  failed_when: loki_secret.rc != 0
  no_log: true

- name: Add Grafana Community Helm repo
  ansible.builtin.command: helm repo add grafana-community https://grafana-community.github.io/helm-charts
  register: loki_repo_add
  failed_when: false
  changed_when: "'has been added' in loki_repo_add.stdout or 'has been added' in loki_repo_add.stderr"
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Update Helm repos
  ansible.builtin.command: helm repo update
  changed_when: false
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf

- name: Render Loki values file
  ansible.builtin.template:
    src: loki-values.yaml.j2
    dest: /tmp/loki-values-{{ loki_release_name }}.yaml
    mode: "0600"

- name: Deploy or upgrade Loki
  block:
    - name: Helm upgrade install loki
      ansible.builtin.command: >
        helm upgrade --install {{ loki_release_name }} grafana-community/loki
        --namespace {{ loki_namespace }}
        --create-namespace
        --version {{ loki_chart_version }}
        -f /tmp/loki-values-{{ loki_release_name }}.yaml
        --wait
        --timeout 30m
      register: loki_helm
      changed_when: loki_helm.rc == 0
      failed_when: loki_helm.rc != 0
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf

  rescue:
    - name: Show Loki pods
      ansible.builtin.command: >
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ loki_namespace }} get pods -o wide
      register: loki_failed_pods
      changed_when: false
      failed_when: false

    - name: Show Loki PVCs
      ansible.builtin.command: >
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ loki_namespace }} get pvc
      register: loki_failed_pvcs
      changed_when: false
      failed_when: false

    - name: Show Loki events
      ansible.builtin.command: >
        kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ loki_namespace }} get events --sort-by=.lastTimestamp
      register: loki_failed_events
      changed_when: false
      failed_when: false

    - name: Print Loki pods
      ansible.builtin.debug:
        msg: "{{ loki_failed_pods.stdout_lines | default([]) }}"

    - name: Print Loki PVCs
      ansible.builtin.debug:
        msg: "{{ loki_failed_pvcs.stdout_lines | default([]) }}"

    - name: Print Loki events
      ansible.builtin.debug:
        msg: "{{ loki_failed_events.stdout_lines | default([]) }}"

    - name: Fail after diagnostics
      ansible.builtin.fail:
        msg: "Loki Helm deployment failed. See diagnostics above."

- name: Show Loki pods
  ansible.builtin.command: >
    kubectl --kubeconfig=/etc/kubernetes/admin.conf -n {{ loki_namespace }} get pods -o wide
  register: loki_pods
  changed_when: false

- name: Print Loki pods
  ansible.builtin.debug:
    msg: "{{ loki_pods.stdout_lines }}"