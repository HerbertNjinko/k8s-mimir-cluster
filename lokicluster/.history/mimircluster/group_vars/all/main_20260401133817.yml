# Kubernetes version stream repo (stable v1.35)
k8s_repo_version: "v1.35"
calico_version: "v3.31.4"
# Pod network CIDR to match Calico
pod_network_cidr: "192.168.0.0/16"

# API advertise address (your control-plane node IP)
apiserver_advertise_address: "172.16.9.105"

# /etc/hosts entries (simple on-prem name resolution)
hosts_entries:
  - { ip: "172.16.9.105", names: ["USP10LPGRAFKUB1", "mimir-control"] }
  - { ip: "172.16.9.102", names: ["USP10LPGRAFMIM1", "mimir-worker1"] }
  - { ip: "172.16.9.103", names: ["USP10LPGRAFMIM2", "mimir-worker2"] }
  - { ip: "172.16.9.104", names: ["USP10LPGRAFMIM3", "mimir-worker3"] }

# Optional: set this if you want kubectl config copied to a specific user on the control node
# If empty, it uses the SSH user you connect as (ansible_user).
kubectl_admin_user: ""

# Calico / cluster sizing already defined elsewhere
# pod_network_cidr: "192.168.0.0/16"

# StorageClass for Loki (and Mimir blocks) - using local-path for simplicity in this on-prem setup
loki_storage_class_name: "local-path"

# Internal SeaweedFS endpoint for Loki to store chunks and indexes
loki_s3_endpoint: "http://USP10WPSEAAPP02:8333"
loki_s3_access_key_id: "{{ vault_loki_s3_access_key_id }}"
loki_s3_secret_access_key: "{{ vault_loki_s3_secret_access_key }}"
loki_s3_insecure: true
loki_s3_force_path_style: true
loki_s3_region: "us-east-1"

loki_bucket_chunks: "loki-chunks"
loki_bucket_ruler: "loki-ruler"
loki_bucket_admin: "loki-admin"

seaweedfs_s3_access_key: "{{ vault_loki_s3_access_key_id }}"
seaweedfs_s3_secret_key: "{{ vault_loki_s3_secret_access_key }}"

# Loki chart
loki_namespace: "loki"
loki_release_name: "loki"
loki_chart_version: "6.55.0"
loki_bucket_secret_version: "0"

ingress_nginx_namespace: "ingress-nginx"
ingress_nginx_release_name: "ingress-nginx"
ingress_nginx_chart_version: "4.14.0"

ingress_nginx_class_name: "nginx"

ingress_nginx_http_nodeport: 30080
ingress_nginx_https_nodeport: 30443

loki_ingress_enabled: true
loki_ingress_name: "loki-gateway"
loki_ingress_host: "loki.internal.yourdomain.com"
loki_ingress_tls_enabled: false
loki_ingress_tls_secret_name: "loki-gateway-tls"


# Deployment model
loki_classic_architecture: true

# Small production-ish footprint for a 4-node cluster
loki_alertmanager_replicas: 2
loki_compactor_replicas: 1
loki_distributor_replicas: 2
loki_ingester_replicas: 2
loki_querier_replicas: 2
loki_query_frontend_replicas: 2
loki_query_scheduler_replicas: 2
loki_ruler_replicas: 1
loki_store_gateway_replicas: 2
loki_gateway_replicas: 2
